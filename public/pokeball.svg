<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 위쪽 빨간 반구 -->
  <path d="M 10,50 A 40,40 0 0 1 90,50 Z" fill="#e63946"/>
  <!-- 아래쪽 흰 반구 -->
  <path d="M 10,50 A 40,40 0 0 0 90,50 Z" fill="#f1f1f1"/>
  <!-- 가운데 검은 띠 -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#111" stroke-width="5.5"/>
  <!-- 외곽 원 테두리 -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#111" stroke-width="5.5"/>
  <!-- 중앙 버튼 외곽 (검은 테두리) -->
  <circle cx="50" cy="50" r="12" fill="#111"/>
  <!-- 중앙 버튼 내부 (흰색) -->
  <circle cx="50" cy="50" r="8" fill="#f1f1f1"/>
</svg>
